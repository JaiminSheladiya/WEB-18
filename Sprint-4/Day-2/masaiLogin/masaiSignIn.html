<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;0,600;0,700;1,300&family=Ubuntu:wght@500&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        *{
            font-family: 'Poppins', sans-serif;
        }
        #logo{
            /* border: 1px solid red; */
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }
        #container{
            /* border: 1px solid green; */
            height: auto;
            width: 30%;
            margin: auto;
            margin-top: 20px;
            display: flex;
            text-align: center;
            flex-direction: column;
            align-items: center;
            color: rgb(74, 74, 74);
            border-radius: 10px;
            box-shadow: rgba(0, 0, 0, 0.16) 0px 3px 6px, rgba(0, 0, 0, 0.23) 0px 3px 6px;
        }
        p{
            font-size: 15px;
        }
        h3+div{
            text-align: left;
            width: 80%;
            margin: auto;
        }
        input{
            height: 30px;
            border-color: rgb(179, 179, 179);
            border-radius: 8px;
            border-width: 0.2px;
            padding-left: 10px;
            width: 100%;
        }
      
        button{
            padding:  10px 65px;
            background-color: rgb(0, 10, 197);
            margin-top: 15px;
            border-width: 0px;
            margin: auto;
            color: white;
            font-size: 15px;
            border-radius: 8px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
    </style>

</head>
<body>
   <div id="logo"><img src="https://sso.masaischool.com/brand_dark.svg"></div> 
    <div id="container">
        <h3>Sign In</h3>
        <div>
            <p>Email</p>
            <input id="email" type="email" placeholder="Enter Email">
            <p>Password</p>
            <input id="password" type="password" placeholder="Enter Password">
       <button>SIGN IN</button>
       
    </div>
</body>
<script>


 document.querySelector("button").addEventListener("click",matchData)

 function matchData(){
    inputData = {
        email : document.querySelector("#email").value,
        password : document.querySelector("#password").value,
    }
    localStorage.getItem("loginInfo",JSON.stringify(inputData))
    var storedData = JSON.parse(localStorage.getItem("loginInfo"))
 if(inputData.email == storedData.email && inputData.password == storedData.password){
     alert("Login Successful")
 }
     else{
        alert("wrong credentials")
     }
 
}



</script>

</html>
